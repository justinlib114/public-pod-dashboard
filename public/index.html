<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Public Pod Dashboard</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/dashboard.css" />
</head>
<body>
<header class="header">

  <a href="https://public-pod-dashboard.onrender.com/" class="headerLogoLink">
    <img 
      src="https://d2jv02qf7xgjwx.cloudfront.net/accounts/286844/images/study_pods1.png"
      alt="Study Pod Availability Dashboard"
      class="headerLogo"
    />
  </a>

  <h1>Study Pod Availability</h1>

  <div id="meta" class="muted"></div>

    <div class="controls">
      <label>
        Start date
        <input id="start" type="date" />
      </label>

      <label>
        End date
        <input id="end" type="date" />
      </label>

      <button id="refresh" type="button">Refresh</button>
    </div>
  </header>

  <main>
    <!-- Mobile/compact layout -->
    <div id="cards" class="cards" aria-live="polite"></div>

    <!-- Desktop layout -->
    <table class="table" id="table">
      <thead>
        <tr>
          <th>Pod</th>
          <th>Status</th>
          <th>Current Reservation</th>
          <th>Next Reservation</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr><td colspan="4" class="muted">Choose dates and click Refresh.</td></tr>
      </tbody>
    </table>
  </main>

  <!-- Pod details modal -->
  <div id="podModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modalBackdrop" data-close="1"></div>

    <div class="modalPanel">
      <div class="modalHeader">
        <div>
          <div id="modalTitle" class="modalTitle">Pod</div>
          <div id="modalSubtitle" class="muted">—</div>
        </div>
        <button id="modalClose" class="modalClose" type="button" aria-label="Close">✕</button>
      </div>

      <div class="modalBody">
        <div class="modalRow">
          <label class="modalLabel">
            Day
            <input id="modalDay" type="date" />
          </label>
        </div>

        <div id="modalList" class="modalList"></div>
      </div>
    </div>
  </div>

  <script src="/dashboard.js"></script>
</body>
</html>
